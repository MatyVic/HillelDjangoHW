version: '3.9'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env_docker
    depends_on:
      - db

  db:
    image: postgres:16-alpine

    environment:
      POSTGRES_USER: my_user
      POSTGRES_PASSWORD: my_secretpass_word
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"

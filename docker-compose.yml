version: '3.9'
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env_docker
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "run_app.sh"]

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: my_user
      POSTGRES_PASSWORD: my_secretpass_word
      POSTGRES_DB: db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U my_user -d db"]
      interval: 5s
      timeout: 5s
      retries: 5
<html>
<head>
    <meta charset="UTF-8">
    <title>Average Price per Category</title>
</head>
<body>
    <h2>Average Price per Category</h2>
    <table border="1">
        <thead>
            <tr>
                <th>Category</th>
                <th>Average Price</th>
            </tr>
        </thead>
        <tbody>
            {% for category in categories %}
            <tr>
                <td>{{ category.name }}</td>
                <td>{{ category.avg_price }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="2">No categories found</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Book Store{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'shop:all_books' %}">Bookstore</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'shop:all_books' %}">All Books</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'shop:cheap_books' %}">Дешеві книги</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'order:new_order' %}">Замовлення</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'user:user_feedback' %}">Користувач</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
</body>
</html>

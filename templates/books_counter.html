<html>
<head>
    <meta charset="UTF-8">
    <title>Books Count per Category</title>
</head>
<body>
    <h2>Books Count per Category</h2>
    <table border="1">
        <thead>
            <tr>
                <th>Category</th>
                <th>Books Count</th>
            </tr>
        </thead>
        <tbody>
            {% for category in categories %}
            <tr>
                <td>{{ category.name }}</td>
                <td>{{ category.book_count }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="2">No categories found</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>

</html>
